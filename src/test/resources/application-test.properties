spring.application.name=itq-documents-service-test

# PostgreSQL для тестов (можно использовать H2 для быстрых тестов)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate для тестов
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Отключаем Liquibase для тестов (используем Hibernate DDL)
spring.liquibase.enabled=false

# Инициализация схемы для H2
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-test.sql

# Отключаем workers в тестах
app.workers.enabled=false

# Logging
logging.level.ru.itq.documents.service=DEBUG

